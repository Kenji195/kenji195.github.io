<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Current commission sheets</title>

    <link rel="stylesheet" href="/styles/imagePreviewStyle.css" />
    <link rel="stylesheet" href="/styles/commissionSheetStyle.css" />

          <img

        <div class="commissionSheet">
          <img
            src="/images/commissions/sheets/Digital Commissions.webp"
            alt="Digital illustration commission price sheet"
            onclick="openPreview(this)" />
        </div>
      </div>
    </div>
  </body>
