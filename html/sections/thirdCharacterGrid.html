<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Third characters</title>

    <link rel="stylesheet" href="/styles/characterGrid.css" />
  </head>
  <body>
    <div class="character-grid">
      <a
        href="/html/pages/sonic/"
        class="character-cell"
        style="
          --cell-bg: #4747ff;
          --glow-color: #1cc6ff;
          --filler-property: 'shut-up';
        ">
        <img
          src="/html/pages/sonic/images/Sonic.png"
          class="character-portrait"
          alt="" />

        <div class="character-logo-bar">
          <img
            src="/html/pages/sonic/images/Logo.png"
            class="character-logo"
            alt="" />
        </div>
      </a>
      <a
        href="/html/pages/ultraman/"
        class="character-cell"
        style="
          --cell-bg: #bf1d1d;
          --glow-color: #ffffff;
          --filler-property: 'shut-up';
        ">
        <img
          src="/html/pages/ultraman/images/Ultraman.png"
          class="character-portrait"
          alt="" />

        <div class="character-logo-bar">
          <img
          src="/html/pages/ultraman/images/Logo.png"
            class="character-logo"
            alt="" />
        </div>
      </a>
    </div>
  </body>
</html>
